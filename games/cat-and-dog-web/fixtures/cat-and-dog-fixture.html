<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat and Dog Fixture</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }
      #root {
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .landing-container,
      .gameplay-container {
        display: grid;
        gap: 12px;
      }
      .menu-buttons {
        display: flex;
        gap: 8px;
      }
      .mode-button {
        padding: 10px 16px;
      }
      canvas {
        width: 640px;
        height: 360px;
        border: 1px solid #333;
        background: #111;
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main id="root">
      <div class="landing-container" data-testid="app-root" id="landing-shell">
        <h1>Cat and Dog Fixture Menu</h1>
        <div id="mode-selection" data-testid="mode-selection" class="menu-buttons">
          <button class="mode-button" data-testid="play-vs-cpu" data-mode="cpu">Play vs CPU</button>
          <button id="play-2-player" class="mode-button" data-testid="play-2-player" data-mode="two-player">2 Player</button>
        </div>
      </div>
      <div id="runtime-mount"></div>
    </main>
    <script>
      const landingShell = document.getElementById("landing-shell");
      const runtimeMount = document.getElementById("runtime-mount");
      const twoPlayerButton = document.getElementById("play-2-player");
      let gameplayShell = null;

      function ensureGameplayShell() {
        if (gameplayShell) {
          return gameplayShell;
        }

        if (!runtimeMount) {
          return null;
        }

        const container = document.createElement("div");
        container.id = "gameplay-shell";
        container.className = "gameplay-container";
        container.innerHTML = `
          <div id="player-hud" data-testid="player-hud">HP: 100</div>
          <canvas data-testid="game-canvas"></canvas>
          <p id="controls-hint" data-testid="controls-hint">Controls: A/D aim, W/S power, 1-5 items</p>
          <p id="aim-status" data-testid="aim-status">Aim: center</p>
        `;

        runtimeMount.appendChild(container);
        gameplayShell = container;
        return container;
      }

      if (twoPlayerButton && landingShell) {
        twoPlayerButton.addEventListener("click", () => {
          ensureGameplayShell();
          landingShell.setAttribute("hidden", "true");
        });
      }

      window.addEventListener("keydown", (event) => {
        if (event.key === "a" || event.key === "A") {
          const target = document.getElementById("aim-status");
          const gameplayVisible = Boolean(gameplayShell);
          if (target && gameplayVisible) {
            target.textContent = "Aim: left";
          }
        }
      });
    </script>
  </body>
</html>
