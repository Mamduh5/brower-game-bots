<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Bot Runs</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Game Bot Runs</h1>
        <p>Local live bot runner, spectator, and completed-run replay viewer.</p>
      </div>
      <button id="refresh-runs" type="button">Refresh</button>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <form id="manual-load-form" class="manual-load">
          <label for="summary-path">Summary path</label>
          <div class="inline-form">
            <input
              id="summary-path"
              name="summaryPath"
              type="text"
              placeholder="artifacts/<runId>/reports/02-player-attempt-summary.json"
            />
            <button type="submit">Load</button>
          </div>
        </form>

        <section>
          <div class="section-heading">
            <h2>Discovered Runs</h2>
            <span id="run-count" class="muted">0</span>
          </div>
          <div id="run-list" class="run-list"></div>
        </section>
      </aside>

      <section class="content">
        <section class="runner detail-header">
          <div class="runner-heading">
            <div>
              <h2>Live Runner</h2>
              <p class="muted">Start a visible or headless bot CLI run and watch real telemetry update.</p>
            </div>
            <div class="runner-actions">
              <button id="start-run" type="button">Start Run</button>
              <button id="stop-run" type="button" disabled>Stop Run</button>
            </div>
          </div>

          <form id="runner-form" class="runner-form">
            <label>
              Game
              <select id="run-game-id" name="gameId">
                <option value="cat-and-dog-web">Cat and Dog</option>
                <option value="chess-com-web">Chess.com Computer</option>
                <option value="minesweeper-online-web">Minesweeper Online</option>
              </select>
            </label>
            <label>
              Difficulty
              <select id="run-difficulty" name="difficulty">
                <option value="easy">easy</option>
                <option value="beginner">beginner</option>
                <option value="normal">normal</option>
                <option value="hard">hard</option>
                <option value="impossible">impossible</option>
              </select>
            </label>
            <label>
              Max attempts
              <input id="run-max-attempts" name="maxAttempts" type="number" min="1" max="50" value="3" />
            </label>
            <label>
              Max moves
              <input id="run-max-moves" name="maxMoves" type="number" min="1" max="500" value="80" />
            </label>
            <label>
              Strategy mode
              <select id="run-strategy-mode" name="strategyMode">
                <option value="baseline">baseline</option>
                <option value="explore">explore</option>
              </select>
            </label>
            <label>
              Browser mode
              <select id="run-browser-mode" name="browserMode">
                <option value="headless">Headless</option>
                <option value="visible">Visible</option>
              </select>
            </label>
            <label class="checkbox-row">
              <input id="run-stop-on-win" name="stopOnWin" type="checkbox" checked />
              Stop on win
            </label>
          </form>

          <div id="live-panel" class="live-panel">
            <div class="status">No active live run.</div>
          </div>
        </section>

        <div id="status" class="status">Loading run artifacts...</div>
        <div id="run-detail" class="hidden"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
